services:
  # 服务1：你的个人网站
  personal-site:
    image: mayxu111/my-personal-site:latest
    pull_policy: always
    ports:
      - "8081:80"
    restart: unless-stopped

  # 服务2：GitHub开源Todo应用 SmartTodo
  tasktrove:
    image: ghcr.io/dohsimpson/tasktrove:latest
    pull_policy: always
    ports:
      - "8082:3000"
    volumes:
      - ./tasktrove-data:/app/data
    restart: unless-stopped
