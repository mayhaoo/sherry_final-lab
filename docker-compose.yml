services:
  # 服务1：你的个人网站
  personal-site:
    image: mayxu111/my-personal-site:latest
    pull_policy: always
    ports:
      - "8081:80"
    restart: unless-stopped

  # 服务2：GitHub开源Todo应用 SmartTodo
  todo-app:
    image: ghcr.io/lizec123/smart-todo:latest
    pull_policy: always
    ports:
      - "8082:80"
    volumes:
      - ./todo-data:/app/data
    restart: unless-stopped
